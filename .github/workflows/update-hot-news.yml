name: Update AI Hot News

on:
  schedule:
    # 每天早上7点执行（UTC时间23:00，北京时间7:00）
    - cron: '0 23 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update-hot-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Update hot news
        run: |
          # 这里可以添加更新热点的逻辑
          # 例如：调用API获取最新AI新闻
          echo "Updating hot news..."
          
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/hot/index.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update hot news - $(date '+%Y-%m-%d')"
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
