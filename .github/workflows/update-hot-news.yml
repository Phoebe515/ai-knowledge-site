name: Update AI Hot News

on:
  schedule:
    # 每天早上7点执行（UTC时间23:00，北京时间7:00）
    - cron: '0 23 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update-hot-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          
      - name: Update hot news
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          python scripts/update_hot_news.py
          
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/hot/index.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update hot news - $(date '+%Y-%m-%d')"
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
