name: Update Data AI Hot News

on:
  schedule:
    # 主时间1：每天早上9点执行（UTC时间1:00，北京时间9:00）
    - cron: '0 1 * * *'
    # 备用时间1：每天早上10点执行（UTC时间2:00，北京时间10:00）
    - cron: '0 2 * * *'
    # 主时间2：每天下午14点执行（UTC时间6:00，北京时间14:00）
    - cron: '0 6 * * *'
    # 备用时间2：每天下午15点执行（UTC时间7:00，北京时间15:00）
    - cron: '0 7 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  issues: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    outputs:
      should_update: ${{ steps.check.outputs.should_update }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check if update needed
        id: check
        run: |
          # 获取当前日期和时间
          NOW=$(date '+%Y-%m-%d %H:%M')
          HOUR=$(date '+%H')
          TODAY=$(date '+%Y-%m-%d')
          echo "Now: $NOW"
          echo "Hour: $HOUR"
          
          # 检查数据热点页面的更新日期
          HOT_FILE="docs/data-hot/index.md"
          if [ -f "$HOT_FILE" ]; then
            LAST_UPDATE=$(grep -o "最近更新：[0-9年月日 :]*" "$HOT_FILE" | head -1)
            echo "Last update in file: $LAST_UPDATE"
            
            # 提取日期和时间
            LAST_DATE=$(echo "$LAST_UPDATE" | grep -o "[0-9]\{4\}年[0-9]\{2\}月[0-9]\{2\}日" | head -1 | sed 's/年/-/g; s/月/-/g; s/日//g')
            LAST_HOUR=$(echo "$LAST_UPDATE" | grep -o "[0-9]\{2\}:[0-9]\{2\}" | head -1 | cut -d: -f1)
            
            echo "Last date: $LAST_DATE, hour: $LAST_HOUR"
            
            # 判断是否需要更新
            # 上午时段（9-12点）：检查今天上午是否已更新
            # 下午时段（14-18点）：检查今天下午是否已更新
            if [ "$LAST_DATE" = "$TODAY" ]; then
              if [ $HOUR -lt 12 ] && [ $LAST_HOUR -lt 12 ]; then
                echo "Already updated this morning"
                echo "should_update=false" >> $GITHUB_OUTPUT
              elif [ $HOUR -ge 12 ] && [ $LAST_HOUR -ge 12 ]; then
                echo "Already updated this afternoon"
                echo "should_update=false" >> $GITHUB_OUTPUT
              else
                echo "Need to update (different time slot)"
                echo "should_update=true" >> $GITHUB_OUTPUT
              fi
            else
              echo "Need to update (different day)"
              echo "should_update=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "File not found, need to update"
            echo "should_update=true" >> $GITHUB_OUTPUT
          fi

  update-data-hot-news:
    needs: check-and-update
    if: needs.check-and-update.outputs.should_update == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          
      - name: Update data AI hot news
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          python scripts/update_data_hot_news.py
          
      - name: Commit changes
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/data-hot/index.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update data AI hot news - $(date '+%Y-%m-%d %H:%M')"
          echo "committed=true" >> $GITHUB_OUTPUT
          
      - name: Push changes
        id: push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        
      - name: Retry push if failed
        if: steps.push.outcome == 'failure'
        run: |
          echo "First push failed, retrying..."
          sleep 10
          git pull --rebase origin main || true
          git push origin main

  create-issue-on-failure:
    needs: update-data-hot-news
    if: failure()
    runs-on: ubuntu-latest
    
    steps:
      - name: Create issue for failure
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ 数据AI热点更新失败 - ${date}`,
              body: `## 更新失败通知\n\n**时间**: ${new Date().toISOString()}\n**工作流**: Update Data AI Hot News\n\n请检查工作流日志并手动修复。\n\n[查看运行日志](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['automated', 'bug']
            });
